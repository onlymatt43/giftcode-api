<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Break That Wall</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: sans-serif;
            background: url('/static/bg.jpg') center/cover no-repeat;
        }
        .glass-block {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.5s ease;
            z-index: 9999;
        }
        .glass-block.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .glass-block form {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        input {
            padding: 10px;
            width: 200px;
            margin-bottom: 1rem;
            border: none;
            border-radius: 8px;
        }
        button {
            background: black;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
        .message {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="glass-block {% if link %}hidden{% endif %}">
    <form id="unlockForm" action="/unlock" method="get">
        <h2>BREAK THAT WALL by om43</h2>
        <input type="text" id="tokenInput" name="token" placeholder="Enter token" required>
        <br>
        <button type="submit">GET IN</button>
        {% if invalid %}
            <div class="message">Invalid or expired token</div>
        {% endif %}
    </form>
</div>

{% if link %}
    <div class="content" style="z-index:1;">
        <iframe src="{{ link }}" width="100%" height="100%" frameborder="0" style="border:none;"></iframe>
    </div>
{% endif %}

<script>
document.addEventListener("DOMContentLoaded", function () {
    const blocker = document.querySelector(".glass-block");
    const tokenInput = document.getElementById("tokenInput");
    const form = document.getElementById("unlockForm");

    {% if link %}
    blocker.classList.add("hidden");
    {% endif %}

    form.addEventListener("submit", function (e) {
        if (!tokenInput.value.trim()) {
            e.preventDefault();
        }
    });
});
</script>

</body>
</html>
